# Separate Ingress objects per backend because nginx-ingress applies the
# rewrite-target annotation to every path within an Ingress object, and each
# backend here needs a different rewrite (based on what path prefix each
# service's own routes actually expect):
#   - auth-service routes are mounted at /api/*      -> strip only "/auth"
#   - booking-service routes are mounted at /api/bookings/* already -> no rewrite
#   - chat-service routes are mounted at /* (no /api) -> strip "/api/chat"
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-ingress
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /api/$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 4002
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bookings-ingress
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/bookings
            pathType: Prefix
            backend:
              service:
                name: booking-service
                port:
                  number: 4001
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chat-ingress
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/chat(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: chat-service
                port:
                  number: 5001
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
